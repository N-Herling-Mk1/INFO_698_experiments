<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FORGE · experiment dashboard</title>
<link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="forge-panel">
<header>
  <img class="mark" src="/static/assets/forge-mark.svg" alt="FORGE">
  <span class="brand">F·O·R·G·E <b>//</b></span>
  <img class="exp-logo" id="expLogo" alt="" hidden>
  <span class="exp" id="expName">…</span>
  <span class="badge" id="phaseBadge">—</span>
  <span class="spacer"></span>
  <div class="phase-toggle" id="phaseToggle"></div>
  <span class="gen" id="gen"></span>
</header>
<div class="panel-title"><span class="dot"></span> EXPLORATORY DATA ANALYSIS</div>
<nav>
  <button class="active" data-tab="overview">Overview</button>
  <button data-tab="integrity">Integrity</button>
  <button data-tab="types">Types</button>
  <button data-tab="figures">Distributions</button>
</nav>
<main>
  <section id="overview" class="active">
    <h2>Snapshot</h2>
    <div class="cards" id="cards"></div>
    <h2>Class balance &amp; exemplars</h2>
    <div class="hero" id="hero"></div>
  </section>

  <section id="integrity">
    <h2>Missing / corrupt</h2>
    <div class="panel" id="integrityPanel"></div>
  </section>

  <section id="types">
    <h2>Type audit — expected vs actual</h2>
    <div class="panel"><table id="typeTable"></table></div>
  </section>

  <section id="figures">
    <h2>Numeric feature statistics</h2>
    <div class="cards" id="featStats"></div>

    <h2>Inspect a variable</h2>
    <div class="var-toggle">
      <select id="varSelect"></select>
      <span class="dim" id="varHint">pick a feature, or click a row below</span>
    </div>
    <div class="var-detail" id="varDetail"></div>

    <h2>All features</h2>
    <div class="toolbar">
      <input id="search" placeholder="filter features…  (e.g. mfcc, tempo, rms)">
      <span class="count" id="figCount"></span>
    </div>
    <div class="table-wrap"><table id="featTable"></table></div>
  </section>
</main>
</div><!-- /forge-panel -->

<div class="modal" id="modal"><img id="modalImg"><div class="cap" id="modalCap"></div></div>

<script src="/static/js/app.js"></script>
</body>
</html>
