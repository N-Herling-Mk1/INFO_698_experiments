<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inference · BEARDOWN</title>
<link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  .wrap{max-width:860px;margin:0 auto;padding:22px}
  .drop{border:2px dashed var(--line);border-radius:10px;padding:38px 20px;text-align:center;
    background:var(--panel);transition:.15s;cursor:pointer}
  .drop.hot{border-color:var(--cyan);background:var(--panel2);box-shadow:0 0 24px rgba(45,226,230,.12)}
  .drop h3{font-family:var(--disp);letter-spacing:.14em;color:var(--cyan-dim);margin:0 0 6px;font-size:15px}
  .drop p{color:var(--muted);font-size:12.5px;margin:4px 0}
  .verdict{display:flex;align-items:baseline;gap:12px;margin:18px 0 6px}
  .verdict .g{font-family:var(--disp);font-size:30px;color:var(--amber);
    text-shadow:0 0 14px rgba(240,165,0,.35);text-transform:uppercase;letter-spacing:.08em}
  .verdict .p{color:var(--text);font-size:15px} .verdict .s{color:var(--muted);font-size:12.5px}
  .bars{margin:14px 0}
  .bar{display:grid;grid-template-columns:84px 1fr 96px;align-items:center;gap:10px;margin:7px 0}
  .bar .lab{color:var(--muted);font-size:12px;text-align:right;text-transform:uppercase;letter-spacing:.08em}
  .track{position:relative;height:16px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));border-radius:8px}
  .whisk{position:absolute;top:50%;height:8px;transform:translateY(-50%);border-left:1px solid var(--amber);
    border-right:1px solid var(--amber);opacity:.85}
  .num{font-size:12px;color:var(--text)} .num .sig{color:var(--amber);opacity:.85}
  .meta{color:var(--muted);font-size:12px;margin:10px 0}
  .err{color:var(--bad);font-size:13px;margin-top:12px}
  .hide{display:none}
  table.seg{width:100%;border-collapse:collapse;margin-top:8px;font-size:12px}
  table.seg th{color:var(--muted);font-weight:400;text-transform:uppercase;letter-spacing:.08em;font-size:10.5px;text-align:left;padding:5px 8px}
  table.seg td{padding:5px 8px;border-top:1px solid var(--line);color:var(--text)}
  .spin{display:inline-block;color:var(--cyan)}
</style>
</head>
<body class="page">
<div class="wrap">
  <h2>Inference — drop a track</h2>
  <div id="drop" class="drop">
    <h3>🐻 DROP AUDIO HERE</h3>
    <p>wav / mp3 / flac — windowed into 30 s segments, scored per genre with epistemic σ</p>
    <p style="color:var(--cyan-dim)">click to choose a file</p>
    <input id="file" type="file" accept="audio/*" class="hide">
  </div>
  <div id="status" class="meta"></div>
  <div id="err" class="err"></div>

  <div id="result" class="hide">
    <div class="verdict">
      <span class="g" id="topG">—</span>
      <span class="p" id="topP"></span>
      <span class="s" id="topS"></span>
    </div>
    <div class="meta" id="rmeta"></div>
    <div class="bars" id="bars"></div>
    <details>
      <summary style="color:var(--muted);cursor:pointer;font-size:12px">per-segment detail</summary>
      <table class="seg" id="segs"></table>
    </details>
  </div>
</div>
<script>
  const $ = s => document.querySelector(s);
  const drop = $("#drop"), file = $("#file");
  drop.addEventListener("click", () => file.click());
  ["dragenter","dragover"].forEach(e => drop.addEventListener(e, ev => {ev.preventDefault(); drop.classList.add("hot");}));
  ["dragleave","drop"].forEach(e => drop.addEventListener(e, ev => {ev.preventDefault(); drop.classList.remove("hot");}));
  drop.addEventListener("drop", ev => { if (ev.dataTransfer.files[0]) send(ev.dataTransfer.files[0]); });
  file.addEventListener("change", () => { if (file.files[0]) send(file.files[0]); });

  async function send(f){
    $("#err").textContent = ""; $("#result").classList.add("hide");
    $("#status").innerHTML = `<span class="spin">▸ analyzing “${f.name}” — extracting mel + 58 features, MC-dropout sampling…</span>`;
    const fd = new FormData(); fd.append("audio", f);
    try{
      const r = await fetch("/api/predict", { method:"POST", body: fd });
      const d = await r.json();
      if(!r.ok || d.error){ $("#status").textContent=""; $("#err").textContent = d.error || `error ${r.status}`; return; }
      render(d, f.name);
    }catch(e){ $("#status").textContent=""; $("#err").textContent = "request failed: " + e; }
  }

  function render(d, name){
    $("#status").textContent = "";
    $("#result").classList.remove("hide");
    $("#topG").textContent = d.top.genre;
    $("#topP").textContent = (100*d.top.prob).toFixed(1) + "%";
    $("#topS").textContent = "± " + (100*d.top.sigma).toFixed(1) + "% (epistemic)";
    $("#rmeta").textContent = `“${name}” · ${d.n_windows} window(s) · σ source: ${d.sigma_source}`;
    const max = Math.max(...d.per_genre.map(x=>x.prob), 0.0001);
    $("#bars").innerHTML = d.per_genre.map(x => {
      const w = 100*x.prob/max, lo = Math.max(0, x.prob - x.sigma), hi = Math.min(1, x.prob + x.sigma);
      const wl = 100*lo/max, wh = 100*hi/max;
      return `<div class="bar">
        <span class="lab">${x.genre}</span>
        <span class="track"><span class="fill" style="width:${w}%"></span>
          <span class="whisk" style="left:${wl}%;width:${Math.max(wh-wl,1)}%"></span></span>
        <span class="num">${(100*x.prob).toFixed(1)}% <span class="sig">±${(100*x.sigma).toFixed(1)}</span></span>
      </div>`;
    }).join("");
    const segs = d.segments || [];
    $("#segs").innerHTML = "<tr><th>window</th><th>top genre</th><th>confidence</th></tr>" +
      segs.map(s => `<tr><td>${s.window}</td><td>${s.top_genre}</td><td>${(100*s.top_prob).toFixed(1)}%</td></tr>`).join("");
  }
</script>
</body>
</html>
