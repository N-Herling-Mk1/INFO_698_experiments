<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BEARDOWN · FORGE</title>
<link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="shell-body">
<div class="shell">

  <!-- top frame -->
  <header class="topframe">
    <img class="shell-logo" id="shellLogo" alt="" hidden>
    <div class="shell-brand">
      <span class="shell-fk">F·O·R·G·E //</span>
      <span class="shell-title" id="shellTitle">BEARDOWN</span>
      <span class="shell-sub" id="shellSub">genre recognition</span>
    </div>
    <span class="top-spacer"></span>
    <!-- real link: the original INFO 510 experiment this reproduction is built on -->
    <a class="top-link" id="repoLink"
       href="https://github.com/N-Herling-Mk1/INFO_510_Fa25_Final_Proj"
       target="_blank" rel="noopener"
       title="Original experiment — N-Herling-Mk1/INFO_510_Fa25_Final_Proj">
      <span class="gh-mark">◧</span> ORIGINAL REPO
    </a>
    <!-- placeholder top button slots (not yet wired — click/hover says so) -->
    <div class="top-slots">
      <span class="flash" id="flash"></span>
      <button class="top-btn" data-ph="refresh"  title="placeholder — refresh (not yet wired)">⟳</button>
      <button class="top-btn" data-ph="settings" title="placeholder — settings (not yet wired)">⚙</button>
      <button class="top-btn" data-ph="help"     title="placeholder — help (not yet wired)">?</button>
    </div>
  </header>

  <!-- left rail -->
  <nav class="rail" id="rail"></nav>

  <!-- main viewport: one iframe, src swaps -->
  <div class="viewport">
    <iframe id="view" src="/welcome" title="panel"></iframe>
    <div class="fyi" id="fyi"></div>
  </div>

</div>

<script>
  // Each rail item is a descriptor. type drives behaviour:
  //   nav    -> swap the iframe src
  //   action -> POST to a backend endpoint, flash status, leave the iframe
  //   both   -> do the action AND point the iframe at a result
  // Today everything is 'nav'; flip a type + add src/action to wire a backend later.
  const PANELS = [
    { id:"welcome",   label:"Welcome",   type:"nav", src:"/welcome",
      fyi:"Project landing — overview of BEARDOWN and a live snapshot of the GTZAN dataset." },
    { id:"experiment",label:"Experiment",type:"nav", src:"/experiment",
      fyi:"The original experiment — B.E.A.R. D.O.W.N.: the multimodal architecture and the epistemic / reliability metrics it was built to explore." },
    { id:"eda",       label:"EDA",       type:"nav", src:"/eda",
      fyi:"Exploratory Data Analysis — integrity checks, type audit, and per-feature / per-genre distributions over the GTZAN features." },
    { id:"training",  label:"Training",  type:"nav", src:"/train",
      fyi:"Model training & runs (stub) — will host training configs, run history, and live metrics." },
    { id:"model",     label:"Model",     type:"nav", src:"/model",
      fyi:"Architecture & weights (stub) — the TensorFlow + tensorflow-probability Flipout Bayesian head and saved weights." },
    { id:"inference", label:"Inference", type:"nav", src:"/infer",
      fyi:"Predict & posterior (stub) — run inference and inspect predictive uncertainty." },
  ];

  const view  = document.getElementById("view");
  const rail  = document.getElementById("rail");
  const flash = document.getElementById("flash");
  const fyiBox = document.getElementById("fyi");
  let active = "welcome";

  function setFYI(p){
    if(!fyiBox || !p) return;
    fyiBox.innerHTML = `<span class="fyi-tag">FYI</span><span class="fyi-text">${p.fyi || ""}</span>`;
  }

  function showFlash(msg, kind){
    flash.textContent = msg || "";
    flash.className = "flash " + (kind || "");
    if(msg) setTimeout(()=>{ flash.textContent=""; flash.className="flash"; }, 3500);
  }

  async function fire(p){
    if(p.type === "nav" || p.type === "both"){
      if(p.src){ view.src = p.src; active = p.id; paint(); setFYI(p); }
    }
    if(p.type === "action" || p.type === "both"){
      if(p.action){
        showFlash("running " + p.label + "…", "run");
        try{
          const r = await fetch(p.action, { method:"POST" });
          showFlash(p.label + (r.ok ? " ✓" : " failed"), r.ok ? "ok" : "err");
        }catch(e){ showFlash(p.label + " failed", "err"); }
      }
    }
  }

  // placeholder top buttons: not wired yet — say so on click (tooltip already says it on hover)
  document.querySelectorAll(".top-btn[data-ph]").forEach(b =>
    b.onclick = () => showFlash(`${b.dataset.ph} is a placeholder — not wired yet`, "run"));

  function paint(){
    rail.innerHTML = PANELS.map(p =>
      `<button class="rail-btn ${p.id===active?'active':''}" data-id="${p.id}">
         <span class="rail-dot"></span><span>${p.label}</span>
       </button>`).join("");
    rail.querySelectorAll("button").forEach(b =>
      b.onclick = () => fire(PANELS.find(x => x.id === b.dataset.id)));
  }
  paint();
  setFYI(PANELS.find(p => p.id === active));

  // logo + title from the same config the panels use
  fetch("/api/config").then(r=>r.json()).then(c=>{
    if(c.logo){ const el=document.getElementById("shellLogo"); el.src=c.logo; el.hidden=false; }
    const DISPLAY={genre:["BEARDOWN","genre recognition"],
                   phonon:["PHONON","DOS reproduction"],
                   atlas:["ATLAS","Run 3"]};
    const [t,s] = DISPLAY[c.experiment] || [(c.experiment||"FORGE").toUpperCase(), ""];
    document.getElementById("shellTitle").textContent = t;
    document.getElementById("shellSub").textContent = s;
  }).catch(()=>{});
</script>
</body>
</html>
